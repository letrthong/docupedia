<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ví dụ Flask Động</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .time-box {
            font-size: 24px;
            color: #007bff;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Chào mừng đến với Flask! 🐍</h1>
        <p>Hôm nay là ngày:</p>
        <div class="time-box">{{ date }}</div>
        
        <p>Bây giờ là:</p>
        <div class="time-box">{{ time }}</div>
    </div>

</body>
</html>
